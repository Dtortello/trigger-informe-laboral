name: Disparador Diario - Informe Laboral TI Abogados

on:
  schedule:
    - cron: "0 12 * * *"   # 08:00 Chile (UTC-4 invierno)
    - cron: "30 12 * * *"  # 08:30 Chile, respaldo por si el primero se salta
  workflow_dispatch:

jobs:
  disparar:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger informe laboral en repo privado
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}' \
            https://api.github.com/repos/Dtortello/monitor-pjud/actions/workflows/297709745/dispatches)
          echo "GitHub API response: $STATUS"
          if [ "$STATUS" = "204" ]; then
            echo "OK - informe disparado correctamente"
          else
            echo "ERROR - respuesta inesperada: $STATUS"
            exit 1
          fi