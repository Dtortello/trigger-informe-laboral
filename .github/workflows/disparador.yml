name: Disparador Diario - Informe Laboral TI Abogados

on:
  schedule:
    - cron: "0 12 * * 1-5"   # 08:00 Chile (UTC-4), lunes a viernes
    - cron: "30 12 * * 1-5"  # 08:30 Chile, respaldo
  workflow_dispatch:

jobs:
  disparar:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger informe laboral
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}" \
            -X POST \
            -H "Authorization: token ${{ secrets.DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"ref":"main"}' \
            https://api.github.com/repos/Dtortello/monitor-pjud/actions/workflows/297709745/dispatches